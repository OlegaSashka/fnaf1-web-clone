<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FNAF 1 Clone - Menu</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div id="game-wrapper">
      <!-- Глобальные overlay -->
      <div id="global-overlays">
        <div id="loading-screen">
          <img id="loading-image" />

          <canvas id="loading-effect-canvas"></canvas>

          <div id="loading-overlay">
            <div id="loading-title"></div>
            <div id="loading-text"></div>
            <div id="loading-progress"></div>
            <button id="loading-continue-btn"></button>
          </div>

          <div id="loading-continue-hint"></div>
        </div>
      </div>

      <!-- Слой экранов -->
      <div id="screens">
        <!-- Экран меню -->
        <div id="menu-screen" class="screen">
          <canvas id="freddy-canvas" width="1920" height="1080"></canvas>
          <canvas id="static-canvas" width="1920" height="1080"></canvas>
          <div id="scanline-sweep" width="1920" height="1080"></div>
          <canvas id="blink-canvas" width="1920" height="1080"></canvas>

          <div id="menu-content">
            <h1 class="title">Пять ночей<br />с Эпштейном</h1>

            <div class="start-buttons">
              <button class="menu-btn" data-action="new">New Game</button>
              <button
                class="menu-btn"
                data-action="continue"
              >
                Continue
              </button>
            </div>

            <div class="about">
              <div class="version">V. 1.0</div>
              <div class="copyright">©2026 Scott Cawthon/OlegSashKa</div>
            </div>
          </div>
        </div>

        <!-- Игровой экран -->
        <div id="game-screen" class="screen" hidden>
          <!-- 1. Сам офис -->
          <div id="office-layer" class="layer">
            <div id="office-viewport">
              <div id="office-world">
                  <canvas id="office-world-canvas" width="2600" height="1080"></canvas>
                  <canvas id="office-light-canvas" width="2600" height="1080"></canvas>
                  <canvas id="office-fan-canvas" width="2600" height="1080"></canvas>

                  <button id="freddy-nose-hitbox" type="button" aria-label="Freddy nose"></button>

                  <div id="left-door-wrap" class="office-door-wrap">
                    <canvas id="office-left-door-canvas" width="229" height="720"></canvas>
                  </div>

                  <div id="right-door-wrap" class="office-door-wrap">
                    <canvas id="office-right-door-canvas" width="229" height="720"></canvas>
                  </div>

                  <div id="left-panel-wrap" class="office-panel-wrap">
                    <canvas id="office-left-panel-canvas" width="92" height="247"></canvas>

                    <button id="left-door-hitbox" class="panel-hitbox panel-hitbox--door-l" type="button"></button>
                    <button id="left-light-hitbox" class="panel-hitbox panel-hitbox--light-l" type="button"></button>
                  </div>

                  <div id="right-panel-wrap" class="office-panel-wrap">
                    <canvas id="office-right-panel-canvas" width="92" height="247"></canvas>

                    <button id="right-door-hitbox" class="panel-hitbox panel-hitbox--door-r" type="button"></button>
                    <button id="right-light-hitbox" class="panel-hitbox panel-hitbox--light-r" type="button"></button>
                  </div>
                  
                  <div id="office-look-zones">
                    <div id="look-zone-left" class="look-zone"></div>
                    <div id="look-zone-center" class="look-zone"></div>
                    <div id="look-zone-right" class="look-zone"></div>
                  </div>

              </div>
            </div>
          </div>

          <!-- 2. HUD поверх офиса -->
          <div id="office-ui-layer" class="layer">
            <div id="office-ui">
              <svg id="night-hud-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
                <text id="night-time-text" x="1850" y="30" text-anchor="end">12 AM</text>
                <text id="night-label-text" x="1850" y="80" text-anchor="end">Night 1</text>

                <text id="night-power-text" x="40" y="960" text-anchor="start">
                  <tspan id="night-power-label-text">Power left:</tspan>
                  <tspan id="night-power-value-text" dx="-10">100%</tspan>
                </text>
                <text id="night-usage-text" x="40" y="1020" text-anchor="start">Usage:</text>
                
                <foreignObject id="night-usage-fo" x="150" y="992" width="103" height="32">
                  <canvas id="night-usage-canvas" width="103" height="32"></canvas>
                </foreignObject>

                <foreignObject id="phone-guy-mute-fo" x="18" y="18" width="170" height="44">
                  <button id="phone-guy-mute-btn" type="button" hidden>MUTE CALL</button>
                </foreignObject>
              </svg>
            </div>
          </div>

          <!-- 3. Анимация поднятия планшета -->
          <div id="monitor-transition-layer" class="layer" hidden>
            <canvas id="monitor-transition-canvas" width="1920" height="1080"></canvas>
          </div>

          <!-- 4. Экран планшета -->
          <div id="monitor-screen-layer" class="layer" hidden>
            <div id="camera-viewport">
              <div id="camera-world">
                <canvas id="camera-world-canvas" width="2600" height="1080"></canvas>
                <canvas id="camera-world-fx-canvas" width="2600" height="1080"></canvas>
              </div>

              <canvas id="camera-static-canvas" width="1920" height="1080"></canvas>
              <canvas id="camera-blink-canvas" width="1920" height="1080"></canvas>
            </div>
          </div>

          <!-- 5. UI планшета -->
          <div id="monitor-ui-layer" class="layer" hidden>
            <div id="monitor-ui">
              <!-- карта и кнопки камер появятся позже -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
