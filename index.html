<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FNAF 1 Clone - Menu</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div id="game-wrapper">
      <!-- Глобальные overlay -->
      <div id="global-overlays">
        <div id="loading-screen">
          <img id="loading-image" />

          <canvas id="loading-effect-canvas"></canvas>

          <div id="loading-overlay">
            <div id="loading-title"></div>
            <div id="loading-text"></div>
            <div id="loading-progress"></div>
            <button id="loading-continue-btn"></button>
          </div>

          <div id="loading-continue-hint"></div>
        </div>
      </div>

      <!-- Слой экранов -->
      <div id="screens">
        <!-- Экран меню -->
        <div id="menu-screen" class="screen">
          <canvas id="freddy-canvas" width="1920" height="1080"></canvas>
          <canvas id="static-canvas" width="1920" height="1080"></canvas>
          <div id="scanline-sweep" width="1920" height="1080"></div>
          <canvas id="blink-canvas" width="1920" height="1080"></canvas>

          <div id="menu-content">
            <h1 class="title">Пять ночей<br />с Эпштейном</h1>

            <div class="start-buttons">
              <button class="menu-btn " data-action="new">New Game</button>
              <button class="menu-btn menu-btn--disabled" data-action="continue">Continue</button>
            </div>

            <div class="about">
              <div class="version">V. 1.0</div>
              <div class="copyright">©2026 Scott Cawthon/OlegSashKa</div>
            </div>
          </div>
        </div>

        <!-- Игровой экран -->
        <div id="game-screen" class="screen" hidden>
          <!-- 1. Сам офис -->
          <div id="office-layer" class="layer">
            <canvas id="office-canvas" width="1920" height="1080"></canvas>
          </div>

          <!-- 2. HUD поверх офиса -->
          <div id="office-ui-layer" class="layer">
            <div id="office-ui">
              <div id="night-hud">
                <!-- часы, энергия, usage -->
              </div>

              <button id="monitor-toggle-btn" hidden></button>
            </div>
          </div>

          <!-- 3. Анимация поднятия планшета -->
          <div id="monitor-transition-layer" class="layer" hidden>
            <canvas
              id="monitor-transition-canvas"
              width="1920"
              height="1080"
            ></canvas>
          </div>

          <!-- 4. Экран планшета -->
          <div id="monitor-screen-layer" class="layer" hidden>
            <canvas id="camera-canvas" width="1920" height="1080"></canvas>
            <canvas
              id="camera-static-canvas"
              width="1920"
              height="1080"
            ></canvas>
            <canvas
              id="camera-blink-canvas"
              width="1920"
              height="1080"
            ></canvas>
          </div>

          <!-- 5. UI планшета -->
          <div id="monitor-ui-layer" class="layer" hidden>
            <div id="monitor-ui">
              <div id="camera-map">
                <!-- карта и кнопки камер -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
