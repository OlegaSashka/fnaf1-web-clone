<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FNAF 1 Clone - Menu</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div id="game-wrapper">
      <!-- Глобальные overlay -->
      <div id="global-overlays">
        <div id="loading-screen">
          <img id="loading-image" />

          <canvas id="loading-effect-canvas"></canvas>

          <div id="loading-overlay">
            <div id="loading-title"></div>
            <div id="loading-text"></div>
            <div id="loading-progress"></div>
            <button id="loading-continue-btn"></button>
          </div>

          <div id="loading-continue-hint"></div>
        </div>
        <svg id="global-ui-layer-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
          <foreignObject id="phone-guy-mute-fo" x="38" y="22" width="170" height="40">
            <button xmlns="http://www.w3.org/1999/xhtml" id="phone-guy-mute-btn" type="button" hidden>MUTE CALL</button>
          </foreignObject>
        </svg>
      </div>

      <!-- Слой экранов -->
      <div id="screens">
        <!-- Экран меню -->
        <div id="menu-screen" class="screen">
          <canvas id="freddy-canvas" width="1920" height="1080"></canvas>
          <canvas id="static-canvas" width="1920" height="1080"></canvas>
          <div id="scanline-sweep" width="1920" height="1080"></div>
          <canvas id="blink-canvas" width="1920" height="1080"></canvas>

          <div id="menu-content">
            <h1 class="title">Пять ночей<br />с Эпштейном</h1>

            <div class="start-buttons">
              <button class="menu-btn" data-action="new">New Game</button>
              <button
                class="menu-btn"
                data-action="continue"
              >
                Continue
              </button>
            </div>

            <div class="about">
              <div class="version">V. 1.0</div>
              <div class="copyright">©2026 Scott Cawthon/OlegSashKa</div>
            </div>
          </div>
        </div>

        <!-- Игровой экран -->
        <div id="game-screen" class="screen" hidden>
          <!-- 1. Сам офис -->
          <div id="office-layer" class="layer">
            <div id="office-viewport">
              <div id="office-world">
                  <canvas id="office-world-canvas" width="2600" height="1080"></canvas>
                  <canvas id="office-light-canvas" width="2600" height="1080"></canvas>
                  <canvas id="office-fan-canvas" width="2600" height="1080"></canvas>

                  <button id="freddy-nose-hitbox" type="button" aria-label="Freddy nose"></button>

                  <div id="left-door-wrap" class="office-door-wrap">
                    <canvas id="office-left-door-canvas" width="229" height="720"></canvas>
                  </div>

                  <div id="right-door-wrap" class="office-door-wrap">
                    <canvas id="office-right-door-canvas" width="229" height="720"></canvas>
                  </div>

                  <div id="left-panel-wrap" class="office-panel-wrap">
                    <canvas id="office-left-panel-canvas" width="92" height="247"></canvas>

                    <button id="left-door-hitbox" class="panel-hitbox panel-hitbox--door-l" type="button"></button>
                    <button id="left-light-hitbox" class="panel-hitbox panel-hitbox--light-l" type="button"></button>
                  </div>

                  <div id="right-panel-wrap" class="office-panel-wrap">
                    <canvas id="office-right-panel-canvas" width="92" height="247"></canvas>

                    <button id="right-door-hitbox" class="panel-hitbox panel-hitbox--door-r" type="button"></button>
                    <button id="right-light-hitbox" class="panel-hitbox panel-hitbox--light-r" type="button"></button>
                  </div>
                  
                  <div id="office-look-zones">
                    <div id="look-zone-left" class="look-zone"></div>
                    <div id="look-zone-center" class="look-zone"></div>
                    <div id="look-zone-right" class="look-zone"></div>
                  </div>

                  <canvas id="jumpscare-canvas" width="2600" height="1080"></canvas>
              </div>
            </div>
          </div>

          <!-- 2. HUD поверх офиса -->
          <div id="office-ui-layer" class="layer">
            <div id="office-ui">
              <svg id="night-hud-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
                <text id="night-time-text" x="1880" y="30" text-anchor="end">12 AM</text>
                <text id="night-label-text" x="1880" y="80" text-anchor="end">Night 1</text>

                <text id="night-power-text" x="40" y="960" text-anchor="start">
                  <tspan id="night-power-label-text">Power left:</tspan>
                  <tspan id="night-power-value-text" dx="-10">100%</tspan>
                </text>
                <text id="night-usage-text" x="40" y="1020" text-anchor="start">Usage:</text>
                
                <foreignObject id="monitor-toggle-fo" x="500" y="1000" width="777" height="60">
                  <canvas id="monitor-toggle-canvas" width="777" height="60"></canvas>
                </foreignObject>

                <foreignObject id="night-usage-fo" x="190" y="1016.5" width="133.9" height="41.6">
                  <canvas id="night-usage-canvas" width="133.9" height="41.6"></canvas>
                </foreignObject>
              </svg>
            </div>
          </div>

          <!-- 3. Анимация поднятия планшета -->
          <div id="monitor-transition-layer" class="layer" hidden>
            <canvas id="monitor-transition-canvas" width="1920" height="1080"></canvas>
          </div>

          <!-- 4. Экран планшета -->
          <div id="monitor-screen-layer" class="layer" hidden>
            <div id="camera-viewport">
              <div id="camera-world">
                <canvas id="camera-world-canvas" width="2600" height="1080"></canvas>
              </div>

              <canvas id="camera-static-canvas" width="1920" height="1080"></canvas>
              <canvas id="camera-blink-canvas" width="1920" height="1080"></canvas>
            </div>
          </div>

          <!-- 5. UI планшета -->
          <div id="monitor-ui-layer" class="layer" hidden>
            <div id="monitor-ui">
              <svg id="monitor-ui-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
                <!-- Рамка монитора -->
                <rect
                  id="monitor-frame"
                  x="8"
                  y="8"
                  width="1904"
                  height="1064"
                  fill="none"
                  stroke="rgba(255,255,255,0.9)"
                  stroke-width="4"
                />

                <!-- Красная точка записи -->
                <circle
                  id="monitor-record-dot"
                  cx="110"
                  cy="95"
                  r="36"
                  fill="#ff2a2a"
                />

                <!-- HUD справа сверху -->
                <text id="monitor-time-text" x="1880" y="30" text-anchor="end">12 AM</text>
                <text id="monitor-night-text" x="1880" y="80" text-anchor="end">Night 1</text>

                <!-- HUD слева снизу -->
                <text id="monitor-power-text" x="40" y="950" text-anchor="start">
                  <tspan id="monitor-power-label-text">Power left:</tspan>
                  <tspan id="monitor-power-value-text" dx="-10">100%</tspan>
                </text>

                <text id="monitor-usage-text" x="40" y="1020" text-anchor="start">Usage:</text>

                <foreignObject id="monitor-usage-fo" x="190" y="1016.5" width="133.9" height="41.6">
                  <canvas id="monitor-usage-canvas" width="133.9" height="41.6"></canvas>
                </foreignObject>

                <!-- Название текущей камеры -->
                <text id="monitor-camera-name-text" x="1320" y="490" text-anchor="start">Show Stage</text>

                <!-- Карта -->
                <image
                  id="monitor-map-image"
                  href="assets/images/camera/EmptyMapWithoutYou.png"
                  x="1320"
                  y="520"
                  width="560"
                  height="500"
                  preserveAspectRatio="none"
                />

                <!-- CAM 1A -->
                <foreignObject id="cam-btn-1a-fo" x="1480" y="555" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-1a" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>1A</span>
                  </button>
                </foreignObject>

                <!-- CAM 1B -->
                <foreignObject id="cam-btn-1b-fo" x="1445" y="615" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-1b" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>1B</span>
                  </button>
                </foreignObject>

                <!-- CAM 1C -->
                <foreignObject id="cam-btn-1c-fo" x="1400" y="715" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-1c" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>1C</span>
                  </button>
                </foreignObject>

                <!-- CAM 2A -->
                <foreignObject id="cam-btn-2a-fo" x="1470" y="865" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-2a" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>2A</span>
                  </button>
                </foreignObject>

                <!-- CAM 2B -->
                <foreignObject id="cam-btn-2b-fo" x="1470" y="910" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-2b" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>2B</span>
                  </button>
                </foreignObject>

                <!-- CAM 3 -->
                <foreignObject id="cam-btn-3-fo" x="1365" y="840" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-3" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>3</span>
                  </button>
                </foreignObject>

                <!-- CAM 4A -->
                <foreignObject id="cam-btn-4a-fo" x="1615" y="865" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-4a" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>4A</span>
                  </button>
                </foreignObject>

                <!-- CAM 4B -->
                <foreignObject id="cam-btn-4b-fo" x="1615" y="910" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-4b" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>4B</span>
                  </button>
                </foreignObject>

                <!-- CAM 5 -->
                <foreignObject id="cam-btn-5-fo" x="1310" y="660" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-5" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>5</span>
                  </button>
                </foreignObject>

                <!-- CAM 6 -->
                <foreignObject id="cam-btn-6-fo" x="1770" y="815" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-6" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>6</span>
                  </button>
                </foreignObject>

                <!-- CAM 7 -->
                <foreignObject id="cam-btn-7-fo" x="1770" y="660" width="72" height="42">
                  <button xmlns="http://www.w3.org/1999/xhtml" id="cam-btn-7" class="monitor-cam-btn" type="button">
                    <span>CAM</span>
                    <span>7</span>
                  </button>
                </foreignObject>

                <!-- YOU -->
                <text id="monitor-you-text" x="1572" y="915" text-anchor="middle">YOU</text>

                <!-- Зона закрытия -->
                <foreignObject id="monitor-close-fo" x="500" y="1000" width="777" height="60"">
                  <canvas id="monitor-close-canvas" width="777" height="60"></canvas>
                </foreignObject>
              </svg>
            </div>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
